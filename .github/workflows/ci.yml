name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tensorhero/tinytorch-tester

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tester
        run: go build -v .

      - name: Run unit tests
        run: go test -v ./...

      - name: Verify binary
        run: ./tinytorch-tester --help

  regression-test:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/tensorhero/tinytorch-tester:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout solution repository
        uses: actions/checkout@v4
        with:
          repository: tensorhero/tinytorch-solution
          token: ${{ secrets.SOLUTION_REPO_PAT }}
          path: solution

      - name: Run regression tests
        run: |
          cd solution
          STAGES=(
            tensor-class computation-graph backpropagation more-backward-ops
            activations linear-layer loss-functions optimizers
            training-loop dataloader-and-mlp embeddings tokenization
            attention transformer-block gpt-and-generate quantization-and-kv-cache
            profiling-and-compression
          )
          LANGUAGES=(java python)

          FAILED=()
          TOTAL=0
          for lang in "${LANGUAGES[@]}"; do
            for stage in "${STAGES[@]}"; do
              TOTAL=$((TOTAL + 1))
              echo "Testing ${stage} (${lang})..."
              if docker run --rm --user $(id -u):$(id -g) -v "$(pwd):/workspace" ghcr.io/tensorhero/tinytorch-tester:test \
                -s "$stage" -d "/workspace/$lang"; then
                echo "✓ ${stage} (${lang}) passed"
              else
                echo "✗ ${stage} (${lang}) failed"
                FAILED+=("${stage}:${lang}")
              fi
            done
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "Failed: ${FAILED[*]}"
            exit 1
          fi

          echo ""
          echo "All ${TOTAL} tests passed!"

  release:
    needs: regression-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
